<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Intereses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-container {
            transition: all 0.3s ease;
        }

        .form-container:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .loader {
            border-top-color: #ffffff;
            animation: spinner 1s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="form-container bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Formulario de Registro</h2>
        <p class="text-gray-500 text-sm text-center mb-8">Completa tus datos para continuar</p>

        <form id="dataForm" class="space-y-5">
            <!-- Nombre -->
            <div>
                <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="Ej. Juan Pérez">
            </div>

            <!-- Teléfono -->
            <div>
                <label for="telefono" class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="+52 123 456 7890">
            </div>

            <!-- Edad -->
            <div>
                <label for="edad" class="block text-sm font-semibold text-gray-700 mb-1">Edad</label>
                <input type="number" id="edad" name="edad" required min="1" max="120"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="Tu edad">
            </div>

            <!-- Intereses -->
            <div>
                <span class="block text-sm font-semibold text-gray-700 mb-3">Áreas de Interés</span>
                <div class="grid grid-cols-1 gap-2">
                    <label
                        class="flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" name="intereses" value="Programacion"
                            class="h-5 w-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">Programación</span>
                    </label>
                    <label
                        class="flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" name="intereses" value="Automatizacion"
                            class="h-5 w-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">Automatización</span>
                    </label>
                    <label
                        class="flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" name="intereses" value="Negocio"
                            class="h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700 text-sm sm:text-base">Negocio</span>
                    </label>
                </div>
            </div>

            <!-- Correo -->
            <div>
                <label for="correo" class="block text-sm font-semibold text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="usuario@ejemplo.com">
            </div>

            <!-- Botón Enviar -->
            <div class="pt-4">
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-blue-700 active:scale-[0.98] disabled:bg-blue-300 disabled:active:scale-100 transition-all flex items-center justify-center shadow-md shadow-blue-200">
                    <span id="btnText">Enviar Registro</span>
                    <div id="btnLoader"
                        class="hidden loader ease-linear rounded-full border-2 border-t-2 border-white/20 h-5 w-5 ml-3">
                    </div>
                </button>
            </div>
        </form>

        <!-- Mensaje de Estado -->
        <div id="statusMessage" class="mt-6 p-4 rounded-xl hidden text-center text-sm font-medium border animate-pulse">
        </div>
    </div>

    <script>
        const form = document.getElementById('dataForm');
        const statusMessage = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validar que al menos un interés esté seleccionado
            const checkboxes = document.querySelectorAll('input[name="intereses"]:checked');
            if (checkboxes.length === 0) {
                showStatus('Por favor, selecciona al menos una área de interés.', 'error');
                return;
            }

            setLoading(true);
            statusMessage.classList.add('hidden');

            const formData = new FormData(form);
            const payload = {};

            formData.forEach((value, key) => {
                if (key === 'intereses') {
                    if (!payload[key]) payload[key] = [];
                    payload[key].push(value);
                } else {
                    payload[key] = value;
                }
            });

            // URL DEL WEBHOOK (Production en Render)
            const webhookUrl = 'https://n8n-73qy.onrender.com/webhook-test/95e782b3-e2a1-474a-9bc4-f335acfe70d5';

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showStatus('¡Registro completado con éxito!', 'success');
                    form.reset();
                } else {
                    showStatus(`Error (${response.status}): No se pudo procesar el registro.`, 'error');
                }
            } catch (error) {
                console.error('Error de red:', error);
                showStatus('Error de conexión con el servidor. Por favor, intenta más tarde.', 'error');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Procesando...';
                btnLoader.classList.remove('hidden');
            } else {
                btnText.textContent = 'Enviar Registro';
                btnLoader.classList.add('hidden');
            }
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');

            if (type === 'success') {
                statusMessage.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            } else {
                statusMessage.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }
        }
    </script>
</body>

</html>
